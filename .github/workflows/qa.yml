name: QA

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'polish/**'
  pull_request:
    branches:
      - main

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: >
          npx prettier --check
          index.html
          about.html
          services.html
          why-setup-matters.html
          contact.html
          "assets/css/**/*.css"
          "assets/js/**/*.js"

      - name: Lint
        run: |
          js_files=$(find assets/js -type f -name '*.js' | sort)
          if [ -n "$js_files" ]; then
            npx eslint $js_files
          else
            echo "No website JavaScript files found to lint."
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
